name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          # Stage the plugin contents into a directory named after the
          # plugin slug so merchants unzip directly into wp-content/plugins
          # and end up with the standard egentify-for-woocommerce/ folder.
          # Versionless filename gives a stable latest-download URL:
          # https://github.com/<owner>/<repo>/releases/latest/download/egentify-for-woocommerce.zip
          # The release tag + title still carry the version, and GitHub
          # auto-generates a versioned source-code archive per release.
          mkdir -p build/egentify-for-woocommerce
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='build' \
            --exclude='*.zip' \
            --exclude='.DS_Store' \
            ./ build/egentify-for-woocommerce/
          cd build
          # Versionless zip powers the stable latest-download URL.
          zip -r egentify-for-woocommerce.zip egentify-for-woocommerce
          # Versioned copy is self-documenting on the Releases page.
          cp egentify-for-woocommerce.zip "egentify-for-woocommerce-${GITHUB_REF_NAME#v}.zip"
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/egentify-for-woocommerce.zip
            build/egentify-for-woocommerce-*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
